<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Document Converter | Atharv</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body>
    <div class="app-background-scene">
        <div class="main-converter-card">
            <header class="app-header">
                <h1>Document Converter</h1>
                <p class="subtitle">Powered by Atharv's Cloud Pipeline</p>
            </header>
            
            <section class="info-banner">
                <span class="info-icon">⚠️</span>
                <p>Supported file formats: <strong>.docx</strong> and <strong>.xlsx</strong></p>
            </section>

            <main class="upload-workspace">
                <div class="file-drop-zone">
                    <label for="fileInput" class="custom-file-label">
                        <span class="upload-icon">📁</span>
                        <span class="label-text">Choose a document...</span>
                    </label>
                    <input type="file" id="fileInput" accept=".docx,.xlsx">
                    <div id="fileSelectedName" class="selected-file-name">No file chosen</div>
                </div>

                <button id="convertBtn" class="primary-convert-btn" onclick="handleFileUpload()">
                    Convert Document
                </button>
            </main>

            <footer class="pipeline-output-panel">
                <div id="status" class="status-message">Ready for document submission</div>
                <div class="progress-bar-container" id="progressContainer">
                    <div class="progress-bar-fill" id="progressBar"></div>
                </div>
                <a id="downloadLink" class="download-pdf-btn" href="#" target="_blank" style="display:none;">
                    📥 Download Converted PDF
                </a>
            </footer>
        </div>

        <div class="rocket-animation-viewport">
            <img src="rocket.gif" alt="System Pipeline Processing Rocket" class="rocket-gif">
        </div>
    </div>

    <script>
        // Synchronize real file picker input with custom stylized shell text
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const fileName = e.target.files[0] ? e.target.files[0].name : "No file chosen";
            document.getElementById('fileSelectedName').textContent = fileName;
        });

        async function handleFileUpload() {
            const fileInput = document.getElementById('fileInput');
            const statusDiv = document.getElementById('status');
            const downloadLink = document.getElementById('downloadLink');
            const convertBtn = document.getElementById('convertBtn');
            const progressBar = document.getElementById('progressBar');
            const progressContainer = document.getElementById('progressContainer');
            
            const file = fileInput.files[0];
            const apiUrl = 'https://t61s64rl2k.execute-api.eu-central-1.amazonaws.com/convert';
            const checkApiUrl = 'https://t61s64rl2k.execute-api.eu-central-1.amazonaws.com/check-pdf';
            
            if (!file) {
                statusDiv.textContent = 'Please select a file first.';
                statusDiv.className = 'status-message error';
                return;
            }

            try {
                // UI State Locking Sequence
                convertBtn.disabled = true;
                downloadLink.style.display = "none";
                progressContainer.style.display = "block";
                progressBar.style.width = "15%";
                
                statusDiv.textContent = 'Requesting secure upload authorization...';
                statusDiv.className = 'status-message active';

                // Request signed target endpoint parameters from API Gateway
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ file_name: file.name, file_type: file.type })
                });

                const data = await response.json();
                if (!data.upload_url) {
                    throw new Error('Authorization rejected by API Gateway Gateway rules.');
                }

                progressBar.style.width = "40%";
                statusDiv.textContent = 'Streaming byte payload safely to S3 storage bucket...';

                // Stream raw binary contents to S3 repository
                const uploadResponse = await fetch(data.upload_url, {
                    method: 'PUT',
                    body: file,
                    headers: { "Content-Type": file.type }
                });

                if (!uploadResponse.ok) {
                    throw new Error('S3 bucket reject target document stream payload.');
                }

                progressBar.style.width = "60%";
                statusDiv.textContent = "Upload verified. Atharv's conversion pipeline is executing...";

                // Initiate polling loops on API Gateway wrapper layer
                checkIfFileExists(checkApiUrl, file.name, statusDiv, downloadLink, progressBar, convertBtn);

            } catch (error) {
                statusDiv.textContent = 'System Failure: ' + error.message;
                statusDiv.className = 'status-message error';
                convertBtn.disabled = false;
                progressBar.style.width = "0%";
                console.error('Execution Context Exception Trace:', error);
            }
        }

        async function checkIfFileExists(checkApiUrl, fileName, statusDiv, downloadLink, progressBar, convertBtn, attempts = 0) {
            if (attempts >= 36) {  
                statusDiv.textContent = "Pipeline execution timeout limit breached. Check back later.";
                statusDiv.className = 'status-message error';
                convertBtn.disabled = false;
                return;
            }

            try {
                // Parse targeted dynamic asset keys matching backend logic extensions
                const pdfFileName = fileName.replace(/\.[^.]+$/, ".pdf");
                const encodedFileName = encodeURIComponent(`converted/${pdfFileName}`);

                const response = await fetch(`${checkApiUrl}?file_name=${encodedFileName}`, { method: 'GET' });

                if (response.ok) {
                    const data = await response.json();
                    
                    if (data.url) {  
                        progressBar.style.width = "100%";
                        downloadLink.href = data.url;
                        downloadLink.style.display = "inline-block";
                        statusDiv.textContent = "Conversion successful! Secure PDF bundle packaged.";
                        statusDiv.className = 'status-message success';
                        convertBtn.disabled = false;
                        return;
                    }
                }
                
                // Increment status indicator rhythmically during background loops
                let currentProgress = 60 + Math.min(attempts * 1, 35);
                progressBar.style.width = currentProgress + "%";

                setTimeout(() => checkIfFileExists(checkApiUrl, fileName, statusDiv, downloadLink, progressBar, convertBtn, attempts + 1), 5000);

            } catch (error) {
                console.error("Polling Connection Drop:", error);
                setTimeout(() => checkIfFileExists(checkApiUrl, fileName, statusDiv, downloadLink, progressBar, convertBtn, attempts + 1), 5000);
            }
        }
    </script>
</body>
</html>
